<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artirealis</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    svg {
      width: min(340px, 80vw);
      height: auto;
    }

    .mark-line {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    }

    .mark-dot {
      opacity: 0;
      animation: dotIn 0.4s ease 1.8s forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes dotIn {
      to { opacity: 1; }
    }

    .wordmark {
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
    }

    .tagline {
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 340 230" xmlns="http://www.w3.org/2000/svg">

      <!-- Triangle mark -->
      <polygon
        class="mark-line"
        points="170,28 226,128 114,128"
        fill="none"
        stroke="#C41E1E"
        stroke-width="1.5"
        stroke-linejoin="round"
      />

      <!-- Crossbar -->
      <line
        class="mark-line"
        x1="137" y1="96"
        x2="203" y2="96"
        stroke="#C41E1E"
        stroke-width="1.5"
      />

      <!-- Peak dot -->
      <circle
        class="mark-dot"
        cx="170" cy="27"
        r="2.5"
        fill="#C41E1E"
      />

      <!-- Wordmark -->
      <text
        class="wordmark"
        x="170" y="168"
        text-anchor="middle"
        font-family="'Didact Gothic', 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif"
        font-size="22"
        font-weight="400"
        letter-spacing="8"
        fill="#C41E1E"
      >ARTIREALIS</text>

      <!-- Tagline -->
      <text
        class="tagline"
        x="170" y="194"
        text-anchor="middle"
        font-family="'Didact Gothic', 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif"
        font-size="7.5"
        font-weight="400"
        letter-spacing="4"
        fill="#C41E1E"
        opacity="0.45"
      >THE ART OF REALITY</text>

    </svg>
  </div>
</body>
</html>
